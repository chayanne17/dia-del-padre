<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Día del Padre</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

background:#111;

color:white;

font-family:Arial,sans-serif;

overflow-y:auto;

}



/* INICIO */


#inicio{

position:fixed;

inset:0;

background:black;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:25px;

z-index:100;

}



#inicio button{

padding:15px 35px;

border:none;

border-radius:30px;

background:#d4af37;

font-size:18px;

font-weight:bold;

}





/* FOTO INICIAL */


#introFoto{

position:fixed;

inset:0;

display:none;

justify-content:center;

align-items:center;

background:black;

z-index:90;

}



#introFoto img{

width:100%;

height:100%;

object-fit:cover;

}



.animar{

animation:alejar 5s forwards;

}



@keyframes alejar{


from{

transform:scale(1);

}


to{

transform:scale(.15);

opacity:0;

}


}






/* CONTENIDO */


#contenido{

display:none;

min-height:100vh;

justify-content:center;

align-items:center;

flex-direction:column;

}



h1{

text-align:center;

margin:20px;

}





/* CORBATA */


.tie-wrapper{

width:100vw;

height:820px;

display:flex;

justify-content:center;

align-items:center;

}



.collage{

position:relative;

width:420px;

height:820px;

}







/* FOTOS */


.fotos{


position:absolute;


inset:0;


z-index:1;



display:grid;



grid-template-columns:repeat(3,80px);



grid-template-rows:repeat(9,85px);



gap:2px;



justify-content:center;



align-content:start;



padding-top:55px;



}




.fotos img{

    width:80px;

    height:85px;

    object-fit:cover;

    border-radius:8px;

    cursor:pointer;

}

/* DISTRIBUCION */


.fotos img:nth-child(1){

grid-column:1;

grid-row:1;

}



.fotos img:nth-child(2){

grid-column:2;

grid-row:1;

}



.fotos img:nth-child(3){

grid-column:3;

grid-row:1;

}





.fotos img:nth-child(5){

grid-column:2;

grid-row:2;

}





.fotos img:nth-child(8){

grid-column:2;

grid-row:3;

}





.fotos img:nth-child(10){

grid-column:1;

grid-row:4;

}



.fotos img:nth-child(11){

grid-column:2;

grid-row:4;

}



.fotos img:nth-child(12){

grid-column:3;

grid-row:4;

}







.fotos img:nth-child(13){

grid-column:1;

grid-row:5;

}



.fotos img:nth-child(14){

grid-column:2;

grid-row:5;

}



.fotos img:nth-child(15){

grid-column:3;

grid-row:5;

}





.fotos img:nth-child(16){

grid-column:1;

grid-row:6;

}



.fotos img:nth-child(17){

grid-column:2;

grid-row:6;

}



.fotos img:nth-child(18){

grid-column:3;

grid-row:6;

}





/* PARTE BAJA */


.fotos img:nth-child(19){

grid-column:1;

grid-row:7;

}



.fotos img:nth-child(20){

grid-column:2;

grid-row:7;

}



.fotos img:nth-child(7){

grid-column:3;

grid-row:7;

}







/* PUNTA PEGADA */


.fotos img:nth-child(4){

grid-column:1;

grid-row:7;

transform:translateY(75px);

}



.fotos img:nth-child(9){

grid-column:2;

grid-row:7;

transform:translateY(75px);

}



.fotos img:nth-child(6){

grid-column:3;

grid-row:7;

transform:translateY(75px);

}


/* CORBATA ENCIMA */


.corbata{


position:absolute;


inset:0;


width:100%;


height:100%;


object-fit:contain;


z-index:2;


pointer-events:none;


}








/* VISOR */


#visor{


position:fixed;


inset:0;



background:rgba(0,0,0,.95);



display:none;



justify-content:center;



align-items:center;



z-index:200;


}




#visor img{


max-width:90%;


max-height:90%;


border-radius:15px;


}





</style>

</head>



<body>



<div id="inicio">




<button onclick="comenzar()">

▶ Comenzar

</button>


</div>






<div id="introFoto">


<img src="fotos/foto1.jpeg" id="fotoPrincipal">


</div>






<div id="contenido">


<h1>

Feliz Día del Padre

</h1>




<div class="tie-wrapper">


<div class="collage">


<div class="fotos" id="fotos"></div>



<img class="corbata" src="assets/corbata.png">


</div>


</div>


</div>








<div id="visor" onclick="cerrarVisor()">


<img id="imagenGrande">


</div>







<audio id="musica" src="audio/cancion.mp3"></audio>






<script>


const contenedor=document.getElementById("fotos");



for(let i=1;i<=20;i++){


let img=document.createElement("img");


img.src=`fotos/foto${i}.jpeg`;



img.onclick=function(){


document.getElementById("imagenGrande").src=this.src;


document.getElementById("visor").style.display="flex";


};


contenedor.appendChild(img);


}







function cerrarVisor(){


document.getElementById("visor").style.display="none";


}







function comenzar(){



document.getElementById("musica").play();



document.getElementById("inicio").style.display="none";



let intro=document.getElementById("introFoto");



intro.style.display="flex";




setTimeout(()=>{


document.getElementById("fotoPrincipal")
.classList.add("animar");

},300);






setTimeout(()=>{


intro.style.display="none";


document.getElementById("contenido")
.style.display="flex";



},5300);



}


</script>



</body>


</html>
